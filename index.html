<html lang="en">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>TCM Boards Tutor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f2ed;font-family:Georgia,serif;color:#1a1a2e;min-height:100vh}
button{font-family:Georgia,serif;cursor:pointer}
input,textarea,select{font-family:Georgia,serif}
a{text-decoration:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(42,181,172,0.4);border-radius:2px}
#app{max-width:860px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.header{background:#fff;border-bottom:1px solid rgba(0,0,0,0.08);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.logo{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2ab5ac,#8b6fd4);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0}
.logo-text{font-size:0.95em;font-weight:700;background:linear-gradient(90deg,#2ab5ac,#8b6fd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:0.6em;color:#9a9590;letter-spacing:0.08em}
.header-right{display:flex;gap:14px;align-items:center}
.xp-box{text-align:center}
.xp-val{font-size:1em;font-weight:700;color:#c4a832}
.xp-lbl{font-size:0.56em;color:#9a9590;text-transform:uppercase}
.progress-bar{height:4px;background:rgba(0,0,0,0.06)}
.progress-fill{height:100%;background:linear-gradient(90deg,#2ab5ac,#8b6fd4);transition:width 0.5s;border-radius:2px}

/* Tabs */
.tabs{background:#fff;border-bottom:1px solid rgba(0,0,0,0.07);overflow-x:auto;display:flex;white-space:nowrap;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 14px;border:none;background:transparent;color:#8a8580;border-bottom:2px solid transparent;font-size:0.72em;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s;font-family:Georgia,serif}
.tab-btn.active{color:#2ab5ac;border-bottom:2px solid #2ab5ac}

/* Panels */
.panel{flex:1;overflow-y:auto;padding:16px;display:none}
.panel.active{display:block}
.ai-panel{flex:1;display:none;flex-direction:column;height:calc(100vh - 120px)}
.ai-panel.active{display:flex}

/* Cards */
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.07)}
.card-teal{background:rgba(42,181,172,0.08);border:1px solid rgba(42,181,172,0.25)}
.card-red{background:rgba(232,85,85,0.07);border:1px solid rgba(232,85,85,0.25)}
.card-purple{background:rgba(139,111,212,0.07);border:1px solid rgba(139,111,212,0.25)}
.card-yellow{background:rgba(196,168,50,0.07);border:1px solid rgba(196,168,50,0.25)}

/* Buttons */
.btn{padding:10px 18px;border-radius:10px;border:none;font-size:0.88em;font-family:Georgia,serif;transition:all 0.2s}
.btn-teal{background:rgba(42,181,172,0.12);border:1px solid rgba(42,181,172,0.3);color:#1a7a75}
.btn-full{width:100%;padding:12px;border-radius:11px;font-size:0.9em;font-weight:700;border:none}
.btn-gradient{background:linear-gradient(135deg,rgba(42,181,172,0.15),rgba(139,111,212,0.15));border:1px solid rgba(42,181,172,0.3);color:#1a7a75}

/* Question types */
.q-label{font-size:0.63em;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:9px;font-weight:700}
.q-text{font-size:0.9em;line-height:1.6;margin-bottom:13px;font-weight:600;color:#1a1a2e}
.q-option{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,0.1);background:#fff;text-align:left;font-size:0.86em;line-height:1.5;transition:all 0.2s;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;color:#2a2a3a}
.q-option:hover{background:rgba(42,181,172,0.05)}
.q-option.correct{background:rgba(42,181,172,0.15);border-color:#2ab5ac;color:#1a7a75}
.q-option.wrong{background:rgba(232,85,85,0.12);border-color:#e85555;color:#c43333}
.tf-btn{flex:1;padding:13px;border-radius:10px;border:1px solid rgba(0,0,0,0.1);background:#fff;font-size:0.95em;font-weight:700;transition:all 0.2s;color:#2a2a3a}

/* Explanation */
.exp-correct{padding:12px 14px;border-radius:12px;border:1px solid rgba(42,181,172,0.35);background:rgba(42,181,172,0.07);margin-bottom:9px}
.exp-wrong{padding:12px 14px;border-radius:12px;border:1px solid rgba(232,85,85,0.35);background:rgba(232,85,85,0.07);margin-bottom:9px}
.exp-title{font-weight:700;font-size:0.9em;margin-bottom:5px}
.exp-text{font-size:0.84em;line-height:1.7;color:#2a2a3a}
.board-note{padding:9px 13px;border-radius:10px;border:1px solid rgba(196,168,50,0.28);background:rgba(196,168,50,0.06);margin-bottom:9px;font-size:0.8em;color:#8a6a00;line-height:1.6}
.simple-box{padding:12px 14px;border-radius:11px;border:1px solid rgba(139,111,212,0.25);background:rgba(139,111,212,0.05);margin-bottom:9px}
.hint-box{padding:10px 14px;border-radius:10px;background:rgba(196,168,50,0.07);border:1px solid rgba(196,168,50,0.22);font-size:0.82em;color:#8a6a00;line-height:1.65;margin-top:6px}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:16px}
.stat-card{padding:12px 10px;border-radius:12px;background:#fff;border:1px solid rgba(0,0,0,0.08);text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.stat-val{font-weight:700;color:#1a1a2e;font-size:0.95em;margin-top:2px}
.stat-lbl{font-size:0.65em;color:#9a9590;margin-top:1px}

/* AI Chat */
.chat-area{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.chat-input-row{padding:10px 14px 14px;border-top:1px solid rgba(0,0,0,0.08);background:#f5f2ed;display:flex;gap:8px;align-items:flex-end}
.chat-msg{display:flex;gap:8px;align-items:flex-start}
.chat-msg.user{justify-content:flex-end}
.chat-bubble{max-width:80%;padding:10px 14px;border-radius:16px;font-size:0.88em;line-height:1.7;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.chat-bubble.assistant{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:4px 16px 16px 16px;color:#1a1a2e}
.chat-bubble.user{background:rgba(42,181,172,0.1);border:1px solid rgba(42,181,172,0.25);border-radius:16px 16px 4px 16px;color:#1a1a2e}
.chat-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#2ab5ac,#8b6fd4);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;margin-top:2px}
.typing{display:flex;gap:5px;align-items:center;padding:12px 16px}
.typing span{width:7px;height:7px;border-radius:50%;background:#2ab5ac;animation:bounce 1.2s infinite;display:inline-block}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}

/* Setup */
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f5f2ed}
.setup-card{background:#fff;border-radius:20px;padding:32px;max-width:440px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
.setup-logo{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#2ab5ac,#8b6fd4);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;margin:0 auto 14px}
.input-field{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(0,0,0,0.15);font-size:0.92em;outline:none;color:#1a1a2e;margin-bottom:12px}
.input-label{font-size:0.78em;font-weight:700;color:#5a5550;text-transform:uppercase;letter-spacing:0.1em;display:block;margin-bottom:6px}

/* Section headers */
.section-hdr{font-size:0.7em;color:#8a8580;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:10px;font-weight:700}

/* HW task */
.hw-task{margin-bottom:8px;padding:11px 13px;border-radius:11px;border:1px solid rgba(0,0,0,0.08);background:#fff;cursor:pointer;display:flex;gap:12px;align-items:flex-start;box-shadow:0 1px 4px rgba(0,0,0,0.05);transition:all 0.2s}
.hw-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(0,0,0,0.15);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.2s}

/* Filter pills */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
.pill{padding:5px 12px;border-radius:20px;border:1px solid rgba(0,0,0,0.1);background:transparent;color:#8a8580;font-size:0.72em;cursor:pointer;transition:all 0.2s;font-family:Georgia,serif}
.pill.active-teal{border-color:rgba(42,181,172,0.4);background:rgba(42,181,172,0.1);color:#2ab5ac}

/* Match */
.match-row{display:flex;gap:8px;margin-bottom:6px}
.match-btn{flex:1;padding:8px 11px;border-radius:9px;border:1px solid rgba(0,0,0,0.1);background:#f8f6f2;font-size:0.78em;text-align:left;min-height:40px;line-height:1.4;transition:all 0.2s;color:#2a2a3a;font-family:Georgia,serif}
.match-btn.active{background:rgba(42,181,172,0.1);border-color:#2ab5ac;color:#2ab5ac}
.match-btn.correct{background:rgba(42,181,172,0.15);border-color:#2ab5ac;color:#1a7a75}
.match-btn.wrong{background:rgba(232,85,85,0.1);border-color:#e85555;color:#c43333}
.match-right{background:rgba(42,181,172,0.08);border:1px solid rgba(42,181,172,0.25);color:#2ab5ac}
.match-right.used{background:#f0ede8;border-color:rgba(0,0,0,0.06);color:#ccc}

/* Quick fire */
#qf-overlay{display:none;position:fixed;inset:0;background:#f5f2ed;z-index:200;flex-direction:column;max-width:860px;margin:0 auto}
#qf-overlay.show{display:flex}
</style>
</head>
<body>
<div id="setup-screen" class="setup-wrap" style="display:none">
  <div class="setup-card">
    <div class="setup-logo">☯</div>
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:1.4em;font-weight:700;background:linear-gradient(90deg,#2ab5ac,#8b6fd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent">TCM Boards Tutor</div>
      <div style="font-size:0.8em;color:#8a8580;margin-top:4px">First-time setup — 30 seconds</div>
    </div>
    <label class="input-label">Student name</label>
    <input id="setup-name" class="input-field" value="Lauren" placeholder="Your name"/>
    <label class="input-label">Claude API Key</label>
    <input id="setup-key" class="input-field" type="password" placeholder="sk-ant-..."/>
    <div style="font-size:0.73em;color:#9a9590;margin-bottom:16px">Stored only in this browser. Get yours at console.anthropic.com</div>
    <div id="setup-err" style="color:#c43333;font-size:0.8em;margin-bottom:10px;display:none"></div>
    <button id="setup-btn" onclick="doSetup()" style="width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#2ab5ac,#8b6fd4);border:none;color:#fff;font-size:0.95em;font-weight:700;font-family:Georgia,serif">Start studying →</button>
  </div>
</div>

<div id="main-app" style="display:none;flex-direction:column;min-height:100vh">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo">☯</div>
      <div>
        <div class="logo-text">TCM BOARDS TUTOR</div>
        <div class="logo-sub" id="hdr-sub">Hi Lauren · Progress saved ✓</div>
      </div>
    </div>
    <div class="header-right">
      <button id="review-btn" onclick="startReview()" style="display:none;background:rgba(232,85,85,0.1);border:1px solid rgba(232,85,85,0.3);border-radius:8px;padding:4px 10px;color:#c43333;font-size:0.7em">↩ <span id="review-count">0</span></button>
      <div class="xp-box"><div class="xp-val" id="xp-display">0</div><div class="xp-lbl">XP</div></div>
      <div class="xp-box"><div class="xp-val" id="streak-display" style="color:#e85555">-</div><div class="xp-lbl">Streak</div></div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="tabs" id="tabs"></div>
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div id="panel-today" class="panel active"></div>
    <div id="panel-study" class="panel"></div>
    <div id="panel-ai" class="ai-panel">
      <div style="padding:10px 16px;background:rgba(42,181,172,0.06);border-bottom:1px solid rgba(42,181,172,0.15);display:flex;gap:10px;align-items:center">
        <div class="chat-avatar">☯</div>
        <div><div style="font-weight:700;font-size:0.88em">Your AI Tutor</div><div style="font-size:0.72em;color:#7a7570">Ask me anything. I know your progress and weak spots.</div></div>
      </div>
      <div class="chat-area" id="chat-area"></div>
      <div class="chat-input-row">
        <textarea id="chat-input" rows="2" placeholder="Ask anything about TCM..." style="flex:1;background:#fff;border:1px solid rgba(0,0,0,0.12);border-radius:10px;padding:9px 13px;color:#1a1a2e;font-size:0.86em;outline:none;resize:none;line-height:1.5"></textarea>
        <button onclick="sendChat()" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#2ab5ac,#8b6fd4);border:none;color:#fff;font-size:16px;flex-shrink:0">→</button>
      </div>
    </div>
    <div id="panel-progress" class="panel"></div>
    <div id="panel-homework" class="panel"></div>
    <div id="panel-notes" class="panel"></div>
    <div id="panel-watch" class="panel"></div>
  </div>
</div>

<!-- Quick Fire overlay -->
<div id="qf-overlay">
  <div style="padding:11px 18px;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;background:#fff">
    <div style="font-weight:700;color:#c4a832;font-size:1em">⚡ Quick Fire</div>
    <button onclick="closeQF()" style="background:transparent;border:1px solid rgba(0,0,0,0.12);border-radius:8px;padding:5px 12px;color:#8a8580;font-size:0.78em">Exit</button>
  </div>
  <div id="qf-content" style="flex:1;display:flex;flex-direction:column;padding:16px;justify-content:center;align-items:center;text-align:center"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const TOPICS={
  "Foundations":{main:"#2ab5ac",bg:"rgba(42,181,172,0.08)",border:"rgba(42,181,172,0.25)",emoji:"🌊"},
  "Zang-Fu":{main:"#e85555",bg:"rgba(232,85,85,0.08)",border:"rgba(232,85,85,0.25)",emoji:"🫀"},
  "Channels & Points":{main:"#8b6fd4",bg:"rgba(139,111,212,0.08)",border:"rgba(139,111,212,0.25)",emoji:"⚡"},
};
const tc=t=>TOPICS[t]||{main:"#c4a832",bg:"rgba(196,168,50,0.08)",border:"rgba(196,168,50,0.25)",emoji:"☯"};

const QS=[
  {id:1,topic:"Foundations",sub:"Yin & Yang",type:"mc",q:"Which symptom BEST distinguishes Yin deficiency from Blood deficiency?",opts:["A. Pale dull complexion","B. Night sweats and five palm heat","C. Blurred vision and dry eyes","D. Palpitations and poor memory"],ans:1,hint:"Think about whether there is a HEAT component — which pattern generates empty heat?",exp:"Night sweats and five palm heat are empty heat signs — the hallmark of Yin deficiency. Blood deficiency has no heat component at all.",simple:"Think of Yin as the body's coolant. When it runs low the body overheats at night. Blood deficiency is just running on empty — pale, tired, dry — but no overheating. Ask: is there heat? Yes = Yin def.",note:"BOARD POINT: Yin def = empty heat. Blood def = pale and dry, zero heat."},
  {id:2,topic:"Foundations",sub:"Yin & Yang",type:"tf",q:"Nocturia (waking at night to urinate) is a Yin deficiency sign.",ans:false,hint:"What does Yang do to fluids? What happens when that function fails at night?",exp:"Nocturia is Yang deficiency. Yang can't transform and hold fluids at night. Yin deficiency urine is scanty and dark — not enough fluid volume.",simple:"Yang is the heating system. When it fails fluids pour out at night: clear, watery, lots. Yin deficiency is a drought — not enough fluid, so urine is small and dark.",note:"Nocturia = Yang def. Scanty dark urine = Yin def. Classic trick question."},
  {id:3,topic:"Foundations",sub:"Yin & Yang",type:"fill",q:"The pulse in Yin deficiency is ___ and ___, while the tongue is red with ___ coat.",blanks:["thin","rapid","little"],hint:"Yin is cool moist substance — what does a pulse look like when substance is depleted AND empty heat builds?",exp:"Thin reflects depleted Yin substance. Rapid reflects empty heat. Red tongue with little or no coat confirms fluids are used up.",simple:"Imagine draining a river. Less water = thinner flow (thin pulse). Heat builds from the drought = faster movement (rapid). Tongue is the riverbed — dries up red.",note:"BOARD POINT: Yin def pulse = thin AND rapid. Always paired."},
  {id:4,topic:"Foundations",sub:"Yin & Yang",type:"match",q:"Match each sign to its pattern",pairs:[["Night sweats","Yin deficiency"],["Nocturia","Yang deficiency"],["Pale complexion","Blood deficiency"],["Malar flush","Yin deficiency"]],hint:"Sort by heat: hot signs = Yin def, cold/watery = Yang def, pale and dry = Blood def.",exp:"Malar flush and night sweats = empty heat = Yin def. Nocturia = Yang failing fluids. Pale complexion = insufficient nourishment = Blood def.",simple:"Sort by heat. Hot = Yin def. Cold/watery = Yang def. Pale and undernourished = Blood def.",note:"BOARD POINT: Empty heat = Yin def. Cold signs = Yang def. Pale/nourishment = Blood def."},
  {id:5,topic:"Foundations",sub:"Qi",type:"mc",q:"Which is NOT a primary function of Qi?",opts:["A. Transforming food into Blood","B. Warming the body","C. Storing Jing (essence)","D. Protecting against pathogens"],ans:2,hint:"Which organ specifically stores Jing? The 5 Qi functions are about movement and maintenance, not storage.",exp:"Storing Jing is a Kidney function. The five Qi functions are: transform, transport, hold, raise, warm and protect.",simple:"Qi is the body's electricity — powers transformation, movement, holding, raising, warmth. Does NOT store things. That's the Kidney's job.",note:"5 Qi functions: transform, transport, hold, raise, warm/protect. Storing Jing = Kidney only."},
  {id:6,topic:"Foundations",sub:"Qi",type:"match",q:"Match each type of Qi to its role",pairs:[["Wei Qi","Exterior defence"],["Ying Qi","Nourishes organs inside vessels"],["Zong Qi","Chest — breathing and heart"],["Yuan Qi","Kidney — constitutional root"]],hint:"Think bodyguard, food delivery, gathering point, genetic foundation.",exp:"Wei = defensive outside vessels. Ying = nutritive inside vessels. Zong = gathers in chest. Yuan = source from Kidney Jing.",simple:"Wei = bodyguard (outside). Ying = food delivery (inside blood vessels). Zong = chest helper. Yuan = your genetic inheritance from parents.",note:"Wei (defence) Ying (nutrition) Zong (chest) Yuan (Kidney/source)"},
  {id:7,topic:"Foundations",sub:"Qi",type:"tf",q:"Qi stagnation typically presents with fixed, stabbing pain.",ans:false,hint:"Is Qi more like gas or a clot? Which one moves and which stays fixed?",exp:"Fixed stabbing pain = Blood stasis. Qi stagnation pain is distending, moves around, relieved by movement or sighing.",simple:"Qi is like gas — stuck gas creates pressure that moves around. Blood is thicker, like a clot — stays in one spot, hurts sharply. Moving = Qi. Fixed stabbing = Blood.",note:"BOARD POINT: Qi stagnation = distending moving pain. Blood stasis = fixed stabbing pain."},
  {id:8,topic:"Foundations",sub:"Blood",type:"mc",q:"Which organ primarily ensures the SMOOTH FLOW of Blood?",opts:["A. Heart","B. Spleen","C. Liver","D. Lung"],ans:2,hint:"The Heart pumps, the Spleen makes — which organ controls smooth traffic flow?",exp:"Heart governs Blood. Spleen produces it. Liver ensures smooth flow. Liver Qi stagnation is the most common cause of Blood stasis.",simple:"Heart = pump. Spleen = factory. Liver = traffic controller. When Liver is stressed, traffic jams happen and Blood stagnates.",note:"Heart = governs. Spleen = produces. Liver = smooth flow + storage."},
  {id:9,topic:"Foundations",sub:"Body Fluids",type:"fill",q:"The three organs most responsible for fluid metabolism are the ___, ___, and ___.",blanks:["Lung","Spleen","Kidney"],hint:"Top (distributes downward), middle (transforms and sends up), bottom (the root).",exp:"Lung distributes fluids down and outward. Spleen transforms and transports upward. Kidney is the root of fluid transformation.",simple:"Water treatment plant: Spleen collects and pumps up, Lung sprays downward, Kidney filters and drains.",note:"BOARD POINT: Lung (distribute), Spleen (transform/transport), Kidney (root)."},
  {id:10,topic:"Zang-Fu",sub:"Heart",type:"mc",q:"Palpitations, insomnia, red tongue TIP, rapid full pulse. Which Heart pattern?",opts:["A. Heart Qi deficiency","B. Heart Yang deficiency","C. Heart Blood deficiency","D. Heart Fire blazing"],ans:3,hint:"Is this hot or cold, full or empty? Look at the tongue tip and pulse quality.",exp:"Heart Fire: palpitations, agitation, insomnia, mouth sores, red face and tongue tip, rapid full pulse. All excess heat signs.",simple:"Heart Fire = engine running too hot. Mind can't settle, heat everywhere (red tongue tip, mouth sores), pulse racing. Heart Blood def = flat battery — no heat, just emptiness.",note:"BOARD POINT: Heart Fire = red tongue TIP, rapid FULL pulse, mouth sores."},

// ── SETUP ─────────────────────────────────────────────────────────────────
async function doSetup(){
  const key=document.getElementById("setup-key").value.trim();
  const name=document.getElementById("setup-name").value.trim()||"Lauren";
  const err=document.getElementById("setup-err");
  const btn=document.getElementById("setup-btn");
  if(!key){err.textContent="Please enter your API key.";err.style.display="block";return;}
  btn.textContent="Testing connection...";btn.disabled=true;
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:10,messages:[{role:"user",content:"hi"}]})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    G.name=name;G.apiKey=key;save();
    document.getElementById("setup-screen").style.display="none";
    document.getElementById("main-app").style.display="flex";
    initApp();
  }catch(e){
    err.textContent="Could not connect: "+e.message;err.style.display="block";
    btn.textContent="Start studying →";btn.disabled=false;
  }
}

function initApp(){
  document.getElementById("hdr-sub").textContent="Hi "+G.name+" · Progress saved ✓";
  buildTabs();renderAll();
  addChatMsg("assistant","Hi "+G.name+"! 👋 I'm your AI tutor. Ask me anything about TCM — concepts you're struggling with, patterns you want explained, or just tell me where you're stuck. I know your progress and I'll focus on what you need most.");
}

function buildTabs(){
  const tabs=[["today","🏠 Today"],["study","🩺 Study"],["ai","🤖 AI Tutor"],["progress","📊 Progress"],["homework","📋 Homework"],["notes","📝 Notes"],["watch","▶️ Watch"]];
  const row=document.getElementById("tabs");
  row.innerHTML=tabs.map(([id,label])=>`<button class="tab-btn ${id==="today"?"active":""}" onclick="switchTab('${id}')">${label}</button>`).join("");
}

function switchTab(id){
  document.querySelectorAll(".panel,.ai-panel").forEach(p=>{p.classList.remove("active")});
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  const panel=document.getElementById("panel-"+id)||document.getElementById("panel-ai");
  if(id==="ai"){document.getElementById("panel-ai").classList.add("active")}
  else{panel.classList.add("active")}
  document.querySelectorAll(".tab-btn").forEach(b=>{if(b.textContent.toLowerCase().includes(id)||b.getAttribute("onclick").includes(id))b.classList.add("active")});
  if(id==="today")renderToday();
  if(id==="study")renderStudy();
  if(id==="progress")renderProgress();
  if(id==="homework")renderHomework();
  if(id==="notes")renderNotes();
  if(id==="watch")renderWatch();
}

function renderAll(){
  updateHeader();renderToday();renderStudy();renderProgress();renderHomework();renderNotes();renderWatch();
}

function updateHeader(){
  document.getElementById("xp-display").textContent=G.xp;
  document.getElementById("streak-display").textContent=G.streak>0?G.streak+"🔥":"-";
  const pct=Math.round(G.answeredIds.size/QS.length*100);
  document.getElementById("progress-fill").style.width=pct+"%";
  const ri=G.reviewIds.length;
  const rb=document.getElementById("review-btn");
  rb.style.display=ri>0?"block":"none";
  document.getElementById("review-count").textContent=ri;
}

function renderToday(){
  const lastSeen=localStorage.getItem("tcm:lastVisit");
  const days=lastSeen?Math.floor((Date.now()-parseInt(lastSeen))/86400000):999;
  const hw=HW[G.currentWeek-1]||HW[0];
  const attempts=Object.values(G.qStats).reduce((s,v)=>s+v.attempts,0);
  const correct=Object.values(G.qStats).reduce((s,v)=>s+v.correct,0);
  const acc=attempts>0?Math.round(correct/attempts*100):0;
  const weakTopics={};
  QS.forEach(q=>{const s=G.qStats[q.id];if(!s)return;if(!weakTopics[q.topic])weakTopics[q.topic]={c:0,t:0};weakTopics[q.topic].c+=s.correct;weakTopics[q.topic].t+=s.attempts;});
  const wt=Object.entries(weakTopics).sort((a,b)=>(a[1].c/a[1].t)-(b[1].c/b[1].t))[0];

  let html=``;
  if(days>2){
    html+=`<div class="card card-red" style="display:flex;gap:12px;align-items:center;margin-bottom:14px"><span style="font-size:1.5em">👀</span><div><div style="font-weight:700;color:#c43333;font-size:0.88em">You haven't studied in ${days} days, ${G.name}.</div><div style="font-size:0.8em;color:#c43333;margin-top:2px">Let's get back on track. Today's tasks are below.</div></div></div>`;
  }else{
    html+=`<div class="card card-teal" style="display:flex;gap:12px;align-items:center;margin-bottom:14px"><span style="font-size:1.5em">👋</span><div><div style="font-weight:700;color:#1a7a75;font-size:0.88em">Good to see you, ${G.name}!</div><div style="font-size:0.8em;color:#1a7a75;margin-top:2px">You're on Week ${G.currentWeek}: ${hw.title}.</div></div></div>`;
  }
  html+=`<div class="stats-grid">
    <div class="stat-card"><div style="font-size:1.1em">📚</div><div class="stat-val">${G.answeredIds.size}/${QS.length}</div><div class="stat-lbl">Done</div></div>
    <div class="stat-card"><div style="font-size:1.1em">🎯</div><div class="stat-val">${acc}%</div><div class="stat-lbl">Accuracy</div></div>
    <div class="stat-card"><div style="font-size:1.1em">📋</div><div class="stat-val">Wk ${G.currentWeek}</div><div class="stat-lbl">Homework</div></div>
  </div>`;
  html+=`<div class="section-hdr">📋 This week's tasks</div>`;
  hw.days.forEach(d=>{
    const done=!!G.tasks[`w${G.currentWeek}_${d.day}`];
    html+=`<div class="hw-task ${done?"hw-done":""}" onclick="toggleTask(${G.currentWeek},'${d.day}')">
      <div class="hw-check" style="${done?`border-color:${hw.color};background:${hw.color}`:""}">
        ${done?'<span style="font-size:0.7em;color:#fff;font-weight:700">✓</span>':""}
      </div>
      <div style="flex:1">
        <div style="font-size:0.72em;font-weight:700;color:${done?hw.color:"#8a8580"};margin-bottom:3px">${d.day} ${d.type==="study"?"🩺":d.type==="watch"?"▶️":d.type==="review"?"✍️":"⚡"}</div>
        <div style="font-size:0.82em;color:${done?"#9a9590":"#2a2a3a"};line-height:1.6;${done?"text-decoration:line-through":""}">${d.task}</div>
      </div>
    </div>`;
  });
  if(wt){html+=`<div class="card card-red" style="margin-top:4px;margin-bottom:14px"><div class="section-hdr" style="color:#e85555">⚠️ Needs work</div><div style="font-weight:700;font-size:0.88em">${wt[0]}</div><div style="font-size:0.8em;color:#7a7570;margin-top:2px">${Math.round(wt[1].c/wt[1].t*100)}% accuracy — filter to this topic in Study and drill it.</div></div>`;}
  html+=`<button class="btn-full btn-gradient" onclick="openQF()" style="font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px">⚡ Quick Fire warm-up — tap to start</button>`;
  document.getElementById("panel-today").innerHTML=html;
}

function toggleTask(week,day){
  const k=`w${week}_${day}`;
  G.tasks[k]=!G.tasks[k];save();renderToday();renderHomework();
}

function renderStudy(){
  const topics=["All",...new Set(QS.map(q=>q.topic))];
  let html=`<div class="filter-row">`;
  topics.forEach(f=>{
    const active=G.filter===f&&G.mode==="queue";
    html+=`<button class="pill ${active?"active-teal":""}" onclick="setFilter('${f}')">${f==="All"?"All":f}</button>`;
  });
  if(G.mode==="review")html+=`<span class="pill active-teal">↩ Review</span>`;
  html+=`</div><div id="study-content"></div>`;
  document.getElementById("panel-study").innerHTML=html;
  renderStudyContent();
}

function getQueue(){
  const filtered=QS.filter(q=>G.filter==="All"||q.topic===G.filter);
  return G.mode==="review"?QS.filter(q=>G.reviewIds.includes(q.id)):filtered.filter(q=>!G.answeredIds.has(q.id));
}

function renderStudyContent(){
  const queue=getQueue();
  currentQ=queue[0]||null;
  const el=document.getElementById("study-content");
  if(!el)return;
  if(!currentQ&&!showExp){el.innerHTML=`<div style="text-align:center;padding:40px 16px"><div style="font-size:2.5em;margin-bottom:10px">🎉</div><div style="font-weight:700;font-size:1em;color:#2ab5ac;margin-bottom:6px">${G.mode==="review"?"Review done!":"Set complete!"}</div><div style="color:#8a8580;font-size:0.83em;margin-bottom:16px">XP: ${G.xp}</div><button class="btn btn-teal" onclick="resetStudy()" style="margin:0 auto;display:block">Start again</button></div>`;return;}
  if(showExp){renderExplanation(el);return;}
  const t=tc(currentQ.topic);
  let html=`<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px"><span>${t.emoji}</span><span style="font-size:0.67em;color:${t.main};text-transform:uppercase;letter-spacing:0.1em;font-weight:700">${currentQ.topic}</span><span style="font-size:0.67em;color:#9a9590">› ${currentQ.sub}</span></div>`;
  html+=`<div style="background:${t.bg};border:1px solid ${t.border};border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)">`;
  html+=`<div class="q-label" style="color:${t.main}">${currentQ.type==="mc"?"MULTIPLE CHOICE":currentQ.type==="tf"?"TRUE / FALSE":currentQ.type==="fill"?"FILL IN THE BLANK":"MATCHING"}</div>`;
  html+=`<div class="q-text">${currentQ.q}</div>`;
  if(currentQ.type==="mc"){
    currentQ.opts.forEach((o,i)=>html+=`<button class="q-option" onclick="answerMC(${i})">${o}</button>`);
  }else if(currentQ.type==="tf"){
    html+=`<div style="display:flex;gap:10px"><button class="tf-btn" onclick="answerTF(true)">TRUE ✓</button><button class="tf-btn" onclick="answerTF(false)">FALSE ✗</button></div>`;
  }else if(currentQ.type==="fill"){
    let bi=0;const parts=currentQ.q.replace(/___/g,()=>`__B${bi++}__`).split(/(__B\d+__)/g);bi=0;
    html+=`<div style="font-size:0.9em;line-height:2.4;margin-bottom:14px">`;
    parts.forEach(p=>{if(p.startsWith("__B")){const idx=bi++;html+=`<input id="fill-${idx}" type="text" placeholder="..." style="width:100px;background:transparent;border:none;border-bottom:2px solid ${t.main};color:${t.main};font-size:0.92em;padding:0 4px;outline:none;text-align:center;margin:0 3px;font-family:Georgia,serif">`;}else html+=`<span>${p}</span>`;});
    html+=`</div><button class="btn btn-teal" onclick="answerFill()" style="border:1px solid rgba(42,181,172,0.3)">Check →</button>`;
  }else if(currentQ.type==="match"){
    matchActive=null;matchMatches={};
    const rights=[...currentQ.pairs.map(p=>p[1])].sort(()=>Math.random()-0.5);
    html+=`<div style="font-size:0.72em;color:#8a8580;margin-bottom:10px">Tap left item first, then tap its match on the right</div>`;
    html+=`<div id="match-area">`;
    currentQ.pairs.forEach((p,i)=>{
      const right=rights[i];
      html+=`<div class="match-row"><button class="match-btn" id="ml-${i}" onclick="matchLeft(${i})">${p[0]}</button><button class="match-btn match-right" id="mr-${i}" onclick="matchRight(${i})" data-val="${right}">${right}</button></div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  if(currentQ.hint){
    html+=`<div style="margin-top:9px"><button id="hint-btn" onclick="toggleHint()" style="width:100%;padding:9px 14px;border-radius:10px;background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.08);color:#8a8580;font-size:0.8em;cursor:pointer;text-align:left;font-family:Georgia,serif">💡 Need a hint?</button><div id="hint-box" class="hint-box" style="display:${showHint?"block":"none"}">${currentQ.hint}</div></div>`;
  }
  el.innerHTML=html;
}

function toggleHint(){
  showHint=!showHint;
  const b=document.getElementById("hint-box");
  const btn=document.getElementById("hint-btn");
  if(b){b.style.display=showHint?"block":"none";}
  if(btn){btn.textContent=showHint?"💡 Hide hint":"💡 Need a hint?";}
}

function answerMC(i){
  const correct=i===currentQ.ans;
  document.querySelectorAll(".q-option").forEach((b,j)=>{
    if(j===currentQ.ans)b.classList.add("correct");
    else if(j===i&&!correct)b.classList.add("wrong");
    b.onclick=null;
  });
  setTimeout(()=>recordAnswer(correct,currentQ.opts[i]),700);
}

function answerTF(val){
  const correct=val===currentQ.ans;
  document.querySelectorAll(".tf-btn").forEach(b=>{
    if((b.textContent.includes("TRUE")&&currentQ.ans===true)||(b.textContent.includes("FALSE")&&currentQ.ans===false)){b.style.background="rgba(42,181,172,0.15)";b.style.borderColor="#2ab5ac";b.style.color="#1a7a75";}
    else if((b.textContent.includes("TRUE")&&val===true&&!correct)||(b.textContent.includes("FALSE")&&val===false&&!correct)){b.style.background="rgba(232,85,85,0.12)";b.style.borderColor="#e85555";b.style.color="#c43333";}
    b.onclick=null;
  });
  setTimeout(()=>recordAnswer(correct,val?"True":"False"),700);
}

function answerFill(){
  let allOk=true;
  currentQ.blanks.forEach((b,i)=>{
    const el=document.getElementById("fill-"+i);
    if(!el)return;
    const ok=el.value.trim().toLowerCase()===b.toLowerCase();
    el.style.borderBottomColor=ok?"#2ab5ac":"#e85555";
    el.style.color=ok?"#1a7a75":"#c43333";
    if(!ok)allOk=false;
  });
  const ans=currentQ.blanks.map((_,i)=>{const e=document.getElementById("fill-"+i);return e?e.value:""}).join(", ");
  setTimeout(()=>recordAnswer(allOk,ans),700);
}

let matchRightsData=[];
function matchLeft(i){
  if(matchMatches[i]!==undefined)return;
  matchActive=i;
  document.querySelectorAll("[id^='ml-']").forEach(b=>b.classList.remove("active"));
  document.getElementById("ml-"+i).classList.add("active");
}

function matchRight(i){
  if(matchActive===null)return;
  const btn=document.getElementById("mr-"+i);
  const val=btn.getAttribute("data-val");
  matchMatches[matchActive]=val;
  const lb=document.getElementById("ml-"+matchActive);
  lb.textContent=lb.textContent.split("→")[0]+"→ "+val;
  lb.classList.remove("active");
  btn.classList.add("used");btn.style.opacity="0.4";btn.onclick=null;
  matchActive=null;
  if(Object.keys(matchMatches).length===currentQ.pairs.length){
    let ok=true;
    currentQ.pairs.forEach((p,i)=>{
      const correct=matchMatches[i]===p[1];
      const lb2=document.getElementById("ml-"+i);
      if(lb2){lb2.classList.add(correct?"correct":"wrong");}
      if(!ok||!correct)ok=false;
    });
    setTimeout(()=>recordAnswer(ok,"matching"),800);
  }
}

function recordAnswer(correct,chosen){
  const q=currentQ;
  G.answeredIds.add(q.id);
  const prev=G.qStats[q.id]||{correct:0,wrong:0,attempts:0};
  G.qStats[q.id]={correct:prev.correct+(correct?1:0),wrong:prev.wrong+(correct?0:1),attempts:prev.attempts+1,lastSeen:Date.now()};
  if(correct){G.xp+=20;G.streak++;G.reviewIds=G.reviewIds.filter(id=>id!==q.id);}
  else{G.streak=0;if(!G.reviewIds.includes(q.id))G.reviewIds.push(q.id);}
  save();updateHeader();
  showExp=true;showSimple=false;showHint=false;
  window._lastAnswer={q,correct,chosen};
  renderStudyContent();
}

function renderExplanation(el){
  const {q,correct,chosen}=window._lastAnswer;
  const t=tc(q.topic);
  let html=`<div style="display:flex;align-items:center;gap:7px;margin-bottom:7px"><span>${t.emoji}</span><span style="font-size:0.67em;color:${t.main};text-transform:uppercase;letter-spacing:0.1em;font-weight:700">${q.topic}</span></div>`;
  html+=`<div class="${correct?"exp-correct":"exp-wrong"}">`;
  html+=`<div class="exp-title" style="color:${correct?"#1a7a75":"#c43333"}">${correct?"✓ Correct +20 XP 🎉":"✗ Not this time"}</div>`;
  if(!correct)html+=`<div style="font-size:0.8em;color:#c43333;margin-bottom:7px">You chose: ${chosen}</div>`;
  html+=`<div class="exp-text">${q.exp}</div></div>`;
  html+=`<button onclick="toggleSimple()" style="width:100%;padding:9px 14px;border-radius:10px;background:rgba(139,111,212,0.08);border:1px solid rgba(139,111,212,0.25);color:#8b6fd4;font-size:0.8em;cursor:pointer;margin-bottom:8px;font-family:Georgia,serif" id="simple-btn">💜 Explain it simpler</button>`;
  html+=`<div id="simple-box" class="simple-box" style="display:${showSimple?"block":"none"}"><div style="font-size:0.7em;letter-spacing:0.12em;text-transform:uppercase;color:#8b6fd4;margin-bottom:7px;font-weight:700">💜 PLAIN ENGLISH</div><div style="font-size:0.85em;line-height:1.75;color:#2a2a3a">${q.simple}</div></div>`;
  if(q.note)html+=`<div class="board-note">📌 ${q.note}</div>`;
  html+=`<button class="btn-full btn-gradient" onclick="nextQ()" style="font-family:Georgia,serif;border:1px solid rgba(42,181,172,0.3)">Next question →</button>`;
  el.innerHTML=html;
}

function toggleSimple(){
  showSimple=!showSimple;
  const b=document.getElementById("simple-box");
  const btn=document.getElementById("simple-btn");
  if(b)b.style.display=showSimple?"block":"none";
  if(btn)btn.textContent=showSimple?"▲ Hide":"💜 Explain it simpler";
}

function nextQ(){showExp=false;showSimple=false;showHint=false;matchActive=null;matchMatches={};renderStudyContent();}
function setFilter(f){G.filter=f;G.mode="queue";showExp=false;showHint=false;matchActive=null;matchMatches={};renderStudy();}
function startReview(){G.mode="review";showExp=false;showHint=false;switchTab("study");}
function resetStudy(){G.answeredIds=new Set();save();showExp=false;G.mode="queue";renderStudy();}

// ── AI CHAT ───────────────────────────────────────────────────────────────
function addChatMsg(role,text){
  G.chatHistory.push({role,content:text});
  const area=document.getElementById("chat-area");
  const div=document.createElement("div");
  div.className="chat-msg "+(role==="user"?"user":"");
  if(role==="assistant"){
    div.innerHTML=`<div class="chat-avatar">☯</div><div class="chat-bubble assistant">${text.replace(/BOARD POINT:[^\n]+/g,m=>`<span style="background:rgba(196,168,50,0.12);border:1px solid rgba(196,168,50,0.3);border-radius:4px;padding:2px 7px;color:#8a6a00;font-weight:600;font-size:0.9em">${m}</span>`)}</div>`;
  }else{
    div.innerHTML=`<div class="chat-bubble user">${text}</div>`;
  }
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function addTyping(){
  const area=document.getElementById("chat-area");
  const div=document.createElement("div");div.className="chat-msg";div.id="typing-msg";
  div.innerHTML=`<div class="chat-avatar">☯</div><div class="chat-bubble assistant"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}
function removeTyping(){const t=document.getElementById("typing-msg");if(t)t.remove();}

async function sendChat(){
  const inp=document.getElementById("chat-input");
  const text=inp.value.trim();if(!text)return;
  inp.value="";
  addChatMsg("user",text);
  addTyping();
  const weakTopics=Object.entries(G.qStats).filter(([,s])=>s.wrong>s.correct).map(([id])=>QS.find(q=>q.id==id)?.sub).filter(Boolean);
  const lastVisit=localStorage.getItem("tcm:lastVisit");
  const daysSince=lastVisit?Math.floor((Date.now()-parseInt(lastVisit))/86400000):0;
  const sys=`You are a warm but direct TCM tutor helping ${G.name} prepare for Canadian CTCMA board exams. She has been out of practice for 2 years.

Her progress: Week ${G.currentWeek}/6 · ${G.answeredIds.size}/${QS.length} questions done · Weak areas: ${weakTopics.length>0?weakTopics.join(", "):"still collecting"} · Days since last study: ${daysSince}

Style: punchy, peer-level, no fluff. Use plain English analogies. Flag exam relevance with "BOARD POINT:" prefix. Keep under 200 words unless asked for more. End with one question to check understanding OR a suggestion of what to study next. If she hasn't studied recently, mention it kindly.`;
  try{
    const msgs=G.chatHistory.map(m=>({role:m.role,content:m.content}));
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":G.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:600,system:sys,messages:msgs})
    });
    const d=await r.json();
    removeTyping();
    const reply=d.content?.[0]?.text||"Sorry, I couldn't get a response. Try again.";
    addChatMsg("assistant",reply);
  }catch(e){removeTyping();addChatMsg("assistant","Connection issue: "+e.message);}
}

document.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("chat-input").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}});
});

           <button onclick="qfNext(false)" style="flex:1;padding:11px;border-radius:10px;background:rgba(232,85,85,0.1);border:1px solid rgba(232,85,85,0.25);color:#c43333;font-size:0.9em;cursor:pointer;font-family:Georgia,serif">✗ Missed</button>

// ── PROGRESS ──────────────────────────────────────────────────────────────
function renderProgress(){
  const attempts=Object.values(G.qStats).reduce((s,v)=>s+v.attempts,0);
  const correct=Object.values(G.qStats).reduce((s,v)=>s+v.correct,0);
  const acc=attempts>0?Math.round(correct/attempts*100):0;
  const weakQs=QS.filter(q=>G.qStats[q.id]&&G.qStats[q.id].wrong>G.qStats[q.id].correct).sort((a,b)=>G.qStats[b.id].wrong-G.qStats[a.id].wrong);
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px">`;
  [["Total XP",G.xp,"#c4a832"],["Accuracy",acc+"%","#2ab5ac"],["Questions",Object.keys(G.qStats).length,"#8b6fd4"],["Streak",G.streak,"#e85555"]].forEach(([l,v,c])=>{
    html+=`<div class="card" style="text-align:center;padding:13px;border:1px solid ${c}25;background:${c}08"><div style="font-size:1.8em;font-weight:700;color:${c}">${v}</div><div style="font-size:0.72em;color:#8a8580;margin-top:2px">${l}</div></div>`;
  });
  html+=`</div>`;
  if(weakQs.length>0){
    html+=`<div class="section-hdr" style="color:#e85555">⚠️ Needs most work</div>`;
    weakQs.slice(0,5).forEach(q=>{
      html+=`<div class="card card-red" style="margin-bottom:7px"><div style="font-size:0.8em;color:#2a2a3a;margin-bottom:3px">${q.q.slice(0,65)}…</div><div style="font-size:0.73em;color:#c43333">✗${G.qStats[q.id].wrong} wrong · ✓${G.qStats[q.id].correct} correct</div></div>`;
    });
  }
  html+=`<div class="section-hdr" style="margin-top:12px">All questions</div>`;
  QS.forEach(q=>{
    const s=G.qStats[q.id];const t=tc(q.topic);
    html+=`<div style="margin-bottom:5px;padding:8px 11px;border-radius:9px;border:1px solid ${t.main}18;background:${t.main}06;display:flex;align-items:center;gap:8px"><span>${t.emoji}</span><div style="flex:1;font-size:0.77em;color:#5a5550;line-height:1.4">${q.q.slice(0,50)}…</div>${s?`<span style="font-size:0.73em;color:#1a7a75;font-weight:700">✓${s.correct}</span><span style="font-size:0.73em;color:#c43333;font-weight:700;margin-left:6px">✗${s.wrong}</span>`:`<span style="font-size:0.7em;color:#c4c0bc">not seen</span>`}</div>`;
  });
  document.getElementById("panel-progress").innerHTML=html;
}

  let html=`<div class="card card-teal" style="margin-bottom:16px">
    <div class="section-hdr" style="color:#2ab5ac">+ Add a note</div>
    <select id="note-topic" style="background:#fff;border:1px solid rgba(0,0,0,0.12);border-radius:8px;padding:6px 10px;color:#2ab5ac;font-size:0.78em;outline:none;margin-bottom:8px;font-family:Georgia,serif">
      ${topics.map(t=>`<option>${t}</option>`).join("")}
    </select>
    <textarea id="note-text" placeholder="Write a note, mnemonic, or thing to remember..." rows="3" style="width:100%;background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:9px;padding:9px 12px;color:#1a1a2e;font-size:0.84em;outline:none;resize:none;line-height:1.6;font-family:Georgia,serif;display:block"></textarea>
    <button onclick="addNote()" style="margin-top:7px;padding:7px 18px;border-radius:8px;background:rgba(42,181,172,0.12);border:1px solid rgba(42,181,172,0.28);color:#1a7a75;font-size:0.8em;cursor:pointer;font-family:Georgia,serif">Save →</button>
  </div>`;
  const refs=[
    {topic:"🌊 Yin def vs Blood def",color:"#2ab5ac",pts:["Blood def: pale, dry, NO heat signs, thin pulse","Yin def: Blood def + EMPTY HEAT — thin AND rapid pulse","Key: is there heat? Yes → Yin def","Heat signs: night sweats · five palm heat · malar flush · afternoon fever"]},
    {topic:"⚡ 5 Functions of Qi",color:"#2ab5ac",pts:["🔄 Transform — food into Blood and Qi","🚀 Transport — move Blood and fluids","📌 Hold — keep organs in position","⬆️ Raise — prevent prolapse","🛡 Warm and Protect — temperature + defence"]},
    {topic:"🫘 Kidney Yin vs Yang",color:"#8b6fd4",pts:["Yin def: night sweats, five palm heat, scanty DARK urine, thin rapid pulse, red tongue no coat","Yang def: nocturia (clear urine), cold lower back/limbs, pale moist tongue, deep slow pulse","Both: tinnitus, low back ache, poor memory, weak knees"]},
    {topic:"🫀 Heart patterns",color:"#e85555",pts:["Qi def: mild palpitations, weak pulse, fatigue","Blood def: pale tongue, thin pulse, insomnia — no heat","Yang def: cold limbs, purple lips, knotted pulse","Fire: red tongue TIP, rapid FULL pulse, mouth sores — excess heat"]},
  ];
  refs.forEach(r=>{
    html+=`<div style="margin-bottom:11px;border:1px solid ${r.color}22;border-radius:11px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05)"><div style="padding:9px 14px;background:${r.color}10;font-weight:700;font-size:0.8em;color:${r.color}">${r.topic}</div><div style="padding:10px 14px;background:#fff">${r.pts.map(p=>`<div style="font-size:0.81em;line-height:1.6;color:#3a3530;margin-bottom:4px">${p}</div>`).join("")}</div></div>`;
  });
  if(G.notes.length>0){
    html+=`<div class="section-hdr" style="color:#c4a832;margin-top:8px">📝 Your notes</div>`;
    [...G.notes].reverse().forEach(n=>{
      html+=`<div class="card card-yellow" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px">
          <div><span style="font-size:0.68em;color:#8a6a00;font-weight:700;margin-right:8px">${n.topic}</span><span style="font-size:0.65em;color:#9a9590">${n.date}</span></div>
          <button onclick="deleteNote(${n.id})" style="background:transparent;border:none;color:#c4c0bc;cursor:pointer;font-size:0.85em">✕</button>
        </div>
        <div style="font-size:0.83em;color:#2a2a3a;line-height:1.65">${n.text}</div>
      </div>`;
    });
  }
  document.getElementById("panel-notes").innerHTML=html;
}
function addNote(){
  const text=document.getElementById("note-text")?.value?.trim();
  const topic=document.getElementById("note-topic")?.value||"General";
  if(!text)return;
  G.notes.push({id:Date.now(),text,topic,date:new Date().toLocaleDateString()});
  save();renderNotes();
}
function deleteNote(id){G.notes=G.notes.filter(n=>n.id!==id);save();renderNotes();}

// ── WATCH ─────────────────────────────────────────────────────────────────
let resOpen=null;
function renderWatch(){
  let html=`<div style="font-size:0.78em;color:#7a7570;line-height:1.6;margin-bottom:14px">Tap a section to open YouTube search links. Aim for videos under 15 minutes.</div>`;
  RES.forEach((s,i)=>{
    html+=`<div style="margin-bottom:11px;border:1px solid ${s.color}22;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05)">
      <div onclick="toggleRes(${i})" style="padding:11px 14px;background:${s.color}0c;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700;font-size:0.85em;color:${s.color}">${s.topic}</div>
        <div style="color:${s.color};font-size:0.85em">${resOpen===i?"▲":"▼"}</div>
      </div>`;
    if(resOpen===i){
      html+=`<div style="padding:10px 14px;background:#fff">`;
      s.items.forEach(item=>{
        html+=`<div style="padding:10px 12px;border-radius:10px;background:#fafaf8;border:1px solid rgba(0,0,0,0.07);margin-bottom:10px">
          <div style="font-weight:700;font-size:0.82em;color:${s.color};margin-bottom:4px">${item.l}</div>
          <div style="font-size:0.78em;color:#7a7570;margin-bottom:8px;line-height:1.5">${item.w}</div>
          <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(item.q)}" target="_blank" style="display:block;padding:8px 12px;border-radius:8px;background:${s.color}10;border:1px solid ${s.color}28;font-size:0.8em;color:${s.color};font-weight:700">
            🎬 Open YouTube search →
            <div style="font-size:0.85em;color:${s.color}88;margin-top:2px;font-weight:400;font-family:monospace">${item.q}</div>
          </a>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  document.getElementById("panel-watch").innerHTML=html;
}
function toggleRes(i){resOpen=resOpen===i?null:i;renderWatch();}

// ── BOOT ──────────────────────────────────────────────────────────────────
load();
if(!G.apiKey){
  document.getElementById("setup-screen").style.display="flex";
}else{
  document.getElementById("main-app").style.display="flex";
  initApp();
}
</script>
</body>
</html>
